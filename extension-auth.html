<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="icon"
      type="image/png"
      href="/assets/Good-Native_Hover_App_Logo_Webflow.png"
    />
    <title>Hover Extension Login</title>
    <link rel="stylesheet" href="/styles/app.css" />
    <script>
      window.GNH_APP = Object.assign({}, window.GNH_APP || {}, {
        extensionAuth: true,
      });
    </script>
    <script src="/js/core.js" defer></script>
  </head>
  <body class="page-cli-auth">
    <main>
      <h1>Connect Hover</h1>
      <p>
        Sign in or create your account. Once complete, this window will send
        your session back to the Webflow Designer extension.
      </p>
      <div id="extensionAuthStatus" class="status">Preparing sign-in…</div>
      <button class="reopen-button" type="button" id="reopenModalBtn">
        Reopen Sign-In Modal
      </button>
      <div id="authModalContainer"></div>
    </main>
  </body>
</html>

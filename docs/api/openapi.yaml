openapi: 3.0.3
info:
  title: Adapt API
  version: 0.4.1
  description: |
    Lean OpenAPI coverage for Adapt's current backend API surface, optimised for
    Postman import, backend testing, and API exploration.

    The spec documents implemented behaviour from the Go handlers rather than
    idealised REST shapes.
servers:
  - url: https://adapt.app.goodnative.co
    description: Production application
  - url: http://localhost:8080
    description: Local development
security:
  - bearerAuth: []
tags:
  - name: System
  - name: Dashboard
  - name: Auth
  - name: Jobs
  - name: Organisations
  - name: Integrations
  - name: Notifications
  - name: Admin
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase bearer token sent in the `Authorization` header.
  parameters:
    JobId:
      name: id
      in: path
      required: true
      description: Job UUID.
      schema:
        type: string
        format: uuid
    Limit:
      name: limit
      in: query
      description: Result size. Invalid values fall back to the handler default.
      schema:
        type: integer
        minimum: 1
    Offset:
      name: offset
      in: query
      description: Result offset.
      schema:
        type: integer
        minimum: 0
  schemas:
    ErrorResponse:
      type: object
      required: [status, message]
      properties:
        status:
          type: integer
          example: 400
        message:
          type: string
          example: Invalid JSON request body
        code:
          type: string
          example: BAD_REQUEST
        request_id:
          type: string
          example: req_123abc
    HealthResponse:
      type: object
      required: [status, timestamp, service]
      properties:
        status:
          type: string
          example: healthy
        timestamp:
          type: string
          format: date-time
        service:
          type: string
          example: adapt
        version:
          type: string
          example: 0.4.1
    UnhealthyResponse:
      type: object
      required: [status, timestamp, service, error]
      properties:
        status:
          type: string
          example: unhealthy
        timestamp:
          type: string
          format: date-time
        service:
          type: string
          example: postgresql
        error:
          type: string
          example: "dial tcp 127.0.0.1:5432: connect: connection refused"
        request_id:
          type: string
          example: req_123abc
    SuccessEnvelope:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: success
        data:
          nullable: true
        message:
          type: string
        request_id:
          type: string
          example: req_123abc
    User:
      type: object
      required: [id, email, created_at, updated_at]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        full_name:
          type: string
          nullable: true
        organisation_id:
          type: string
          nullable: true
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OrganisationSummary:
      type: object
      required: [id, name, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AuthMethods:
      type: array
      items:
        type: string
      example: [google, email]
    AuthRegisterRequest:
      type: object
      required: [user_id, email]
      properties:
        user_id:
          type: string
          description: Supabase user ID.
        email:
          type: string
          format: email
        first_name:
          type: string
          maxLength: 80
        last_name:
          type: string
          maxLength: 80
        full_name:
          type: string
          maxLength: 120
        org_name:
          type: string
      example:
        user_id: 87b9df5c-6b62-49a1-8d6b-4b4dcb0a0b8c
        email: simon@example.com
        first_name: Simon
        last_name: Small
        org_name: Good Native
    RegisterData:
      type: object
      required: [user, organisation]
      properties:
        user:
          $ref: "#/components/schemas/User"
        organisation:
          $ref: "#/components/schemas/OrganisationSummary"
    SessionRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
      example:
        token: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
    SessionInfo:
      type: object
      required: [is_valid, refresh_needed]
      properties:
        is_valid:
          type: boolean
        expires_at:
          type: integer
          format: int64
          nullable: true
        refresh_needed:
          type: boolean
        user_id:
          type: string
        email:
          type: string
          format: email
    ProfileData:
      type: object
      required: [user, auth_methods]
      properties:
        user:
          $ref: "#/components/schemas/User"
        auth_methods:
          $ref: "#/components/schemas/AuthMethods"
        organisation:
          $ref: "#/components/schemas/OrganisationSummary"
    UpdateProfileRequest:
      type: object
      properties:
        first_name:
          type: string
          nullable: true
          maxLength: 80
        last_name:
          type: string
          nullable: true
          maxLength: 80
        full_name:
          type: string
          nullable: true
          maxLength: 120
      example:
        first_name: Simon
        last_name: Small
        full_name: Simon Small
    Pagination:
      type: object
      required: [limit, offset, total, has_next, has_prev]
      properties:
        limit:
          type: integer
        offset:
          type: integer
        total:
          type: integer
        has_next:
          type: boolean
        has_prev:
          type: boolean
    Job:
      type: object
      required:
        - id
        - domain_id
        - domain
        - status
        - total_tasks
        - completed_tasks
        - failed_tasks
        - skipped_tasks
        - progress
        - created_at
        - concurrency
        - max_pages
        - adaptive_delay_seconds
      properties:
        id:
          type: string
          format: uuid
        domain_id:
          type: integer
        domain:
          type: string
        status:
          type: string
          example: running
        total_tasks:
          type: integer
        completed_tasks:
          type: integer
        failed_tasks:
          type: integer
        skipped_tasks:
          type: integer
        progress:
          type: number
          format: float
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        duration_seconds:
          type: integer
          nullable: true
        avg_time_per_task_seconds:
          type: number
          format: float
          nullable: true
        stats:
          type: object
          additionalProperties: true
          nullable: true
        scheduler_id:
          type: string
          format: uuid
          nullable: true
        concurrency:
          type: integer
        max_pages:
          type: integer
        source_type:
          type: string
          nullable: true
        crawl_delay_seconds:
          type: integer
          nullable: true
        adaptive_delay_seconds:
          type: integer
    CreateJobRequest:
      type: object
      required: [domain]
      properties:
        domain:
          type: string
        use_sitemap:
          type: boolean
        find_links:
          type: boolean
        allow_cross_subdomain_links:
          type: boolean
        concurrency:
          type: integer
        max_pages:
          type: integer
        source_type:
          type: string
        source_detail:
          type: string
        source_info:
          type: string
          description: JSON string stored for provenance.
      example:
        domain: example.com
        use_sitemap: true
        find_links: true
        concurrency: 20
        max_pages: 250
    JobsListData:
      type: object
      required: [jobs, pagination]
      properties:
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/Job"
        pagination:
          $ref: "#/components/schemas/Pagination"
        include:
          type: string
          description: Echoed include string when provided.
    JobActionRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [cancel]
      example:
        action: cancel
    Task:
      type: object
      required: [id, job_id, path, url, status, created_at, retry_count]
      properties:
        id:
          type: string
          format: uuid
        job_id:
          type: string
          format: uuid
        host:
          type: string
          nullable: true
        path:
          type: string
        url:
          type: string
          format: uri
        status:
          type: string
        status_code:
          type: integer
          nullable: true
        response_time:
          type: integer
          nullable: true
        cache_status:
          type: string
          nullable: true
        second_response_time:
          type: integer
          nullable: true
        second_cache_status:
          type: string
          nullable: true
        content_type:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
        source_type:
          type: string
          nullable: true
        source_url:
          type: string
          format: uri
          nullable: true
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        retry_count:
          type: integer
        page_views_7d:
          type: integer
          nullable: true
        page_views_28d:
          type: integer
          nullable: true
        page_views_180d:
          type: integer
          nullable: true
    TasksListData:
      type: object
      required: [tasks, pagination]
      properties:
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
        pagination:
          $ref: "#/components/schemas/Pagination"
    ExportColumn:
      type: object
      required: [key, label]
      properties:
        key:
          type: string
        label:
          type: string
    JobExportData:
      type: object
      required:
        - job_id
        - domain
        - status
        - created_at
        - export_type
        - export_time
        - total_tasks
        - columns
        - tasks
      properties:
        job_id:
          type: string
          format: uuid
        domain:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        export_type:
          type: string
          enum: [job, broken-links, slow-pages]
        export_time:
          type: string
          format: date-time
        total_tasks:
          type: integer
        columns:
          type: array
          items:
            $ref: "#/components/schemas/ExportColumn"
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
    Scheduler:
      type: object
      required:
        - id
        - domain
        - schedule_interval_hours
        - next_run_at
        - is_enabled
        - concurrency
        - find_links
        - max_pages
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        domain:
          type: string
        schedule_interval_hours:
          type: integer
          enum: [6, 12, 24, 48]
        next_run_at:
          type: string
          format: date-time
        is_enabled:
          type: boolean
        concurrency:
          type: integer
        find_links:
          type: boolean
        max_pages:
          type: integer
        include_paths:
          type: array
          items:
            type: string
        exclude_paths:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SchedulerRequest:
      type: object
      properties:
        domain:
          type: string
          description: Required on create, ignored on update.
        schedule_interval_hours:
          type: integer
          enum: [6, 12, 24, 48]
        concurrency:
          type: integer
        find_links:
          type: boolean
        max_pages:
          type: integer
        include_paths:
          type: array
          items:
            type: string
        exclude_paths:
          type: array
          items:
            type: string
        is_enabled:
          type: boolean
        expected_is_enabled:
          type: boolean
          description: Optional optimistic concurrency hint on update.
    DashboardStatsData:
      type: object
      required:
        - total_jobs
        - running_jobs
        - completed_jobs
        - failed_jobs
        - total_tasks
        - avg_completion_time
        - date_range
      properties:
        total_jobs:
          type: integer
        running_jobs:
          type: integer
        completed_jobs:
          type: integer
        failed_jobs:
          type: integer
        total_tasks:
          type: integer
        avg_completion_time:
          type: number
          format: float
        date_range:
          type: string
        period_start:
          type: string
          format: date-time
          nullable: true
        period_end:
          type: string
          format: date-time
          nullable: true
    ActivityPoint:
      type: object
      required: [timestamp, jobs_count, tasks_count]
      properties:
        timestamp:
          type: string
        jobs_count:
          type: integer
        tasks_count:
          type: integer
    DashboardActivityData:
      type: object
      required: [activity, date_range]
      properties:
        activity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityPoint"
        date_range:
          type: string
        period_start:
          type: string
          format: date-time
          nullable: true
        period_end:
          type: string
          format: date-time
          nullable: true
    SlowPage:
      type: object
      required: [url, domain, path, second_response_time, job_id, completed_at]
      properties:
        url:
          type: string
          format: uri
        domain:
          type: string
        host:
          type: string
          nullable: true
        path:
          type: string
        second_response_time:
          type: integer
        job_id:
          type: string
          format: uuid
        completed_at:
          type: string
          format: date-time
    SlowPagesData:
      type: object
      required: [slow_pages, date_range, count]
      properties:
        slow_pages:
          type: array
          items:
            $ref: "#/components/schemas/SlowPage"
        date_range:
          type: string
        period_start:
          type: string
          format: date-time
          nullable: true
        period_end:
          type: string
          format: date-time
          nullable: true
        count:
          type: integer
    ExternalRedirect:
      type: object
      required: [url, domain, path, redirect_url, job_id, completed_at]
      properties:
        url:
          type: string
          format: uri
        domain:
          type: string
        host:
          type: string
          nullable: true
        path:
          type: string
        redirect_url:
          type: string
          format: uri
        job_id:
          type: string
          format: uuid
        completed_at:
          type: string
          format: date-time
    ExternalRedirectsData:
      type: object
      required: [external_redirects, date_range, count]
      properties:
        external_redirects:
          type: array
          items:
            $ref: "#/components/schemas/ExternalRedirect"
        date_range:
          type: string
        period_start:
          type: string
          format: date-time
          nullable: true
        period_end:
          type: string
          format: date-time
          nullable: true
        count:
          type: integer
    MetricInfo:
      type: object
      required: [name, description, info_html]
      properties:
        name:
          type: string
        description:
          type: string
        info_html:
          type: string
    OrganisationBasic:
      type: object
      required: [id, name, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OrganisationsListData:
      type: object
      required: [organisations]
      properties:
        organisations:
          type: array
          items:
            $ref: "#/components/schemas/OrganisationBasic"
        active_organisation_id:
          type: string
          format: uuid
          nullable: true
    CreateOrganisationRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 100
      example:
        name: Good Native
    SwitchOrganisationRequest:
      type: object
      required: [organisation_id]
      properties:
        organisation_id:
          type: string
          format: uuid
    OrganisationMember:
      type: object
      required: [id, email, full_name, role, created_at]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        full_name:
          type: string
        role:
          type: string
          enum: [admin, member]
        created_at:
          type: string
          format: date-time
    OrganisationMembersData:
      type: object
      required: [members, current_user_id, current_user_role]
      properties:
        members:
          type: array
          items:
            $ref: "#/components/schemas/OrganisationMember"
        current_user_id:
          type: string
        current_user_role:
          type: string
          enum: [admin, member]
    UpdateOrganisationMemberRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [admin, member]
    InvitePreviewData:
      type: object
      required: [invite]
      properties:
        invite:
          type: object
          required:
            [
              email,
              role,
              organisation_id,
              organisation_name,
              inviter_name,
              expires_at,
            ]
          properties:
            email:
              type: string
              format: email
            role:
              type: string
            organisation_id:
              type: string
              format: uuid
            organisation_name:
              type: string
            inviter_name:
              type: string
            expires_at:
              type: string
              format: date-time
    OrganisationInvite:
      type: object
      required: [id, email, role, created_at, expires_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, member]
        invite_link:
          type: string
          format: uri
        email_delivery:
          type: string
          enum: [sent, skipped, failed]
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
    OrganisationInvitesData:
      type: object
      required: [invites]
      properties:
        invites:
          type: array
          items:
            $ref: "#/components/schemas/OrganisationInvite"
    CreateOrganisationInviteRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, member]
      example:
        email: teammate@example.com
        role: member
    AcceptOrganisationInviteRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
    UpdateOrganisationPlanRequest:
      type: object
      required: [plan_id]
      properties:
        plan_id:
          type: string
    UsageStats:
      type: object
      required:
        - daily_limit
        - daily_used
        - daily_remaining
        - usage_percentage
        - plan_id
        - plan_name
        - plan_display_name
        - resets_at
      properties:
        daily_limit:
          type: integer
        daily_used:
          type: integer
        daily_remaining:
          type: integer
        usage_percentage:
          type: number
          format: float
        plan_id:
          type: string
        plan_name:
          type: string
        plan_display_name:
          type: string
        resets_at:
          type: string
          format: date-time
    DailyUsage:
      type: object
      required: [usage_date, pages_processed, jobs_created]
      properties:
        usage_date:
          type: string
          example: "2026-03-08"
        pages_processed:
          type: integer
        jobs_created:
          type: integer
    UsageHistoryData:
      type: object
      required: [days, usage]
      properties:
        days:
          type: integer
        usage:
          type: array
          items:
            $ref: "#/components/schemas/DailyUsage"
    CreateDomainRequest:
      type: object
      required: [domain]
      properties:
        domain:
          type: string
      example:
        domain: example.com
    DomainRegistration:
      type: object
      required: [domain_id, domain]
      properties:
        domain_id:
          type: integer
        domain:
          type: string
    PublicPlan:
      type: object
      required: [id, name, display_name, daily_page_limit, monthly_price_cents]
      properties:
        id:
          type: string
        name:
          type: string
        display_name:
          type: string
        daily_page_limit:
          type: integer
        monthly_price_cents:
          type: integer
    WebflowWebhookPayload:
      type: object
      required: [triggerType, payload]
      properties:
        triggerType:
          type: string
          example: site_publish
        siteId:
          type: string
          nullable: true
        payload:
          type: object
          required: [domains, publishedBy]
          properties:
            domains:
              type: array
              items:
                type: string
            publishedBy:
              type: object
              properties:
                displayName:
                  type: string
    SlackConnection:
      type: object
      required: [id, workspace_id, workspace_name, created_at]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
        workspace_name:
          type: string
        created_at:
          type: string
          format: date-time
    SlackUserLink:
      type: object
      required: [id, slack_user_id, dm_notifications, created_at]
      properties:
        id:
          type: string
          format: uuid
        slack_user_id:
          type: string
        dm_notifications:
          type: boolean
        created_at:
          type: string
          format: date-time
    OAuthRedirectResponse:
      type: object
      required: [auth_url]
      properties:
        auth_url:
          type: string
          format: uri
    SlackConnectionDetail:
      type: object
      required: [connection]
      properties:
        connection:
          $ref: "#/components/schemas/SlackConnection"
        user_link:
          $ref: "#/components/schemas/SlackUserLink"
    WebflowConnection:
      type: object
      required: [id, created_at]
      properties:
        id:
          type: string
          format: uuid
        webflow_workspace_id:
          type: string
        workspace_name:
          type: string
        created_at:
          type: string
          format: date-time
    WebflowSiteSetting:
      type: object
      required:
        [webflow_site_id, site_name, primary_domain, auto_publish_enabled]
      properties:
        webflow_site_id:
          type: string
        site_name:
          type: string
        primary_domain:
          type: string
        last_published:
          type: string
        schedule_interval_hours:
          type: integer
          nullable: true
        auto_publish_enabled:
          type: boolean
        scheduler_id:
          type: string
          format: uuid
          nullable: true
    WebflowSitesListData:
      type: object
      required: [sites, pagination]
      properties:
        sites:
          type: array
          items:
            $ref: "#/components/schemas/WebflowSiteSetting"
        pagination:
          type: object
          required: [total, page, limit, has_next]
          properties:
            total:
              type: integer
            page:
              type: integer
            limit:
              type: integer
            has_next:
              type: boolean
    UpdateWebflowSiteScheduleRequest:
      type: object
      required: [connection_id]
      properties:
        connection_id:
          type: string
          format: uuid
        schedule_interval_hours:
          type: integer
          enum: [6, 12, 24, 48]
          nullable: true
          description: Send `null` to remove the schedule.
    UpdateWebflowAutoPublishRequest:
      type: object
      required: [connection_id, enabled]
      properties:
        connection_id:
          type: string
          format: uuid
        enabled:
          type: boolean
    GoogleConnection:
      type: object
      required: [id, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        ga4_property_id:
          type: string
        ga4_property_name:
          type: string
        google_account_name:
          type: string
        google_email:
          type: string
          format: email
        status:
          type: string
          enum: [active, inactive]
        domain_ids:
          type: array
          items:
            type: integer
        created_at:
          type: string
          format: date-time
    UpdateGoogleConnectionDomainsRequest:
      type: object
      required: [domain_ids]
      properties:
        domain_ids:
          type: array
          items:
            type: integer
    UpdateGoogleConnectionStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, inactive]
    SaveGooglePropertyRequest:
      type: object
      required: [property_id, refresh_token]
      properties:
        property_id:
          type: string
        property_name:
          type: string
        refresh_token:
          type: string
        access_token:
          type: string
        google_email:
          type: string
          format: email
        google_user_id:
          type: string
    Notification:
      type: object
      required: [id, type, subject, preview, created_at]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [job_complete, job_failed, scheduler_run, scheduler_error]
        subject:
          type: string
        preview:
          type: string
        message:
          type: string
        link:
          type: string
        read_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorised:
      description: Authentication failed or token missing
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

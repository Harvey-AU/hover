root = "."
tmp_dir = "tmp"

[build]
# Mac/Linux (default)
cmd = "go build -o ./tmp/main ./cmd/app"
bin = "tmp/main"

# Windows: override with dev.sh pc, or run: air -build.cmd "go build -o ./tmp/main.exe ./cmd/app" -build.bin "tmp/main.exe"
# cmd = "go build -o ./tmp/main.exe ./cmd/app"
# bin = "tmp/main.exe"

include_ext = ["go", "env"]
exclude_dir = ["tmp", "vendor", "testdata"]
exclude_regex = ["_test\\.go$"]
delay = 1000

[log]
time = true
main_only = false

[screen]
clear_on_rebuild = true

[misc]
clean_on_exit = true

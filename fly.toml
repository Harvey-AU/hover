# fly.toml app configuration file generated for hover
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hover'
primary_region = 'syd'

[build]

[env]
  APP_ENV = "production"
  APP_URL = "https://hover.app.goodnative.co"
  SETTINGS_URL = "https://hover.app.goodnative.co/settings"
  WORKER_CONCURRENCY = "10"  # Increasing this pushes Supabase small plan past CPU limit
  ALLOW_DB_RESET = "false"
  GNH_HEALTH_PROBE_INTERVAL_SECONDS = "30"
  GNH_WORKER_IDLE_THRESHOLD = "0.10"
  GNH_WORKER_SCALE_COOLDOWN_SECONDS = "120"
  DB_QUEUE_MAX_CONCURRENCY = "40"
  DB_TX_MAX_RETRIES = "5"
  FLIGHT_RECORDER_ENABLED = "false"
  LOG_LEVEL = "info"
  GNH_RUNNING_TASK_BATCH_SIZE = "32"
  GNH_RUNNING_TASK_FLUSH_INTERVAL_MS = "200"
  OBSERVABILITY_ENABLED = "true"
  SUPABASE_AUTH_URL = "https://hover.auth.goodnative.co"
  SUPABASE_URL = "https://gpzjtbgtdjxnacdfujvx.supabase.co"
  SUPABASE_PROJECT_REF = "gpzjtbgtdjxnacdfujvx"

  SUPABASE_FALLBACK_AUTH_URL = "https://gpzjtbgtdjxnacdfujvx.supabase.co"
  SUPABASE_LEGACY_AUTH_URL = "https://gpzjtbgtdjxnacdfujvx.supabase.co"
  SUPABASE_PUBLISHABLE_KEY = "sb_publishable_xCn-z8wEo4MPJnbPq6cvXg_09fINjIp"
  GNH_ENABLE_TURNSTILE = "true"
  SLACK_CLIENT_ID = "475806237719.8953791603746"
  WEBFLOW_CLIENT_ID = "b0a05758d95823fcef73f57e836e55232bf7c5730794222786040800230ea329"
  GOOGLE_CLIENT_ID = "721107686014-okh41udv0lkb40ijnsoeh53unj9kn0en.apps.googleusercontent.com"
  OTEL_EXPORTER_OTLP_ENDPOINT = "https://otlp-gateway-prod-au-southeast-1.grafana.net/otlp"

[deploy]
  strategy = "immediate"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "10s"
    [http_service.checks.headers]
      Content-Type = "text/plain"

[processes]
  app = "./main --log-level=info"

[[vm]]
  memory = '2gb'
  cpu_kind = 'performance'
  cpus = 1

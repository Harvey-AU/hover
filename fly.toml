# fly.toml app configuration file generated for hover
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hover'
primary_region = 'syd'

[build]

# For documentation on all env vars below, see docs/architecture/CONFIG_REFERENCE.md
[env]
  APP_ENV = "production"
  APP_URL = "https://hover.app.goodnative.co"
  SETTINGS_URL = "https://hover.app.goodnative.co/settings"
  ALLOW_DB_RESET = "true"
  GNH_MAX_WORKERS = "130"
  DB_MAX_OPEN_CONNS = "60"
  DB_MAX_IDLE_CONNS = "15"
  DB_QUEUE_MAX_CONCURRENCY = "100"
  GNH_PRESSURE_HIGH_MARK_MS = "80"
  GNH_PRESSURE_LOW_MARK_MS = "40"
  # GNH_PRESSURE_INITIAL_LIMIT intentionally unset — pressure.go defaults it to
  # DB_QUEUE_MAX_CONCURRENCY (safeMax). Setting it explicitly invites drift and
  # the "exceeds queue cap" clamp warning if the two values get out of sync.
  GNH_PRESSURE_MIN_LIMIT = "30"
  GNH_PRESSURE_STEP_DOWN = "5"
  REDIS_POOL_SIZE = "50"
  GNH_SITEMAP_BATCH_SIZE = "100"
  GNH_SITEMAP_BATCH_DELAY_MS = "200"
  GNH_SITEMAP_CONCURRENCY = "5"
  GNH_CRAWLER_MAX_CONCURRENCY = "100"
  GNH_OTEL_EXPORT_INTERVAL_SECONDS = "60"
  GNH_LINK_DISCOVERY_MIN_PRIORITY = "0.5"
  DB_TX_MAX_RETRIES = "5"
  FLIGHT_RECORDER_ENABLED = "false"
  LOG_LEVEL = "info"
  GNH_BATCH_CHANNEL_SIZE = "5000"
  OBSERVABILITY_ENABLED = "true"
  SUPABASE_AUTH_URL = "https://hover.auth.goodnative.co"
  SUPABASE_URL = "https://gpzjtbgtdjxnacdfujvx.supabase.co"
  SUPABASE_PROJECT_REF = "gpzjtbgtdjxnacdfujvx"

  SUPABASE_FALLBACK_AUTH_URL = "https://gpzjtbgtdjxnacdfujvx.supabase.co"
  SUPABASE_LEGACY_AUTH_URL = "https://gpzjtbgtdjxnacdfujvx.supabase.co"
  SUPABASE_PUBLISHABLE_KEY = "sb_publishable_xCn-z8wEo4MPJnbPq6cvXg_09fINjIp"
  GNH_ENABLE_TURNSTILE = "true"
  SLACK_CLIENT_ID = "475806237719.8953791603746"
  WEBFLOW_CLIENT_ID = "b0a05758d95823fcef73f57e836e55232bf7c5730794222786040800230ea329"
  GOOGLE_CLIENT_ID = "721107686014-okh41udv0lkb40ijnsoeh53unj9kn0en.apps.googleusercontent.com"
  OTEL_EXPORTER_OTLP_ENDPOINT = "https://otlp-gateway-prod-au-southeast-1.grafana.net/otlp/v1/traces"
  # Cold-storage archival (R2) — defaults in internal/archive/archive.go
  ARCHIVE_PROVIDER = "r2"
  ARCHIVE_BUCKET = "native-hover-archive"
  ARCHIVE_RETENTION_JOBS = "3"   # completed jobs kept in Supabase per domain/org
  ARCHIVE_INTERVAL = "1m"       # sweep frequency
  ARCHIVE_BATCH_SIZE = "100"    # candidates per sweep
  ARCHIVE_CONCURRENCY = "5"     # parallel uploads per sweep

[deploy]
  strategy = "immediate"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "10s"
    [http_service.checks.headers]
      Content-Type = "text/plain"

[processes]
  app = "./start.sh"

[[vm]]
  memory = '8gb'
  cpu_kind = 'performance'
  cpus = 4

name: Auto Release

# This workflow automatically creates releases when commits land on main.
# It uses a fine-grained Personal Access Token (PAT_TOKEN) to bypass branch protection.
#
# PAT Configuration:
# - Name: "Hover Release Automation"
# - Type: Fine-grained token
# - Expiration: 365 days (expires ~1 year from creation)
# - Repository: Harvey-AU/hover
# - Permissions: Contents (read/write), Pull requests (read/write)
# - Location: https://github.com/settings/tokens?type=beta
# - Secret: 1Password vault "Good Native", item "hover-github", field "PAT_TOKEN"
#
# When to renew:
# - GitHub will email you before expiration
# - Create new token with same permissions
# - Update PAT_TOKEN in 1Password (hover-github) — workflows load it via 1Password

on:
  push:
    branches:
      - main

jobs:
  auto-tag:
    name: Auto Tag Release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          PAT_TOKEN: op://Good Native/hover-github/PAT_TOKEN

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ env.PAT_TOKEN }}

      - name: Check for no-release label
        id: skip
        uses: actions/github-script@v8
        with:
          script: |
            const sha = context.sha;
            let shouldSkip = false;

            try {
              const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: sha
              });

              if (prs && prs.length > 0) {
                shouldSkip = prs.some(pr =>
                  pr.labels && pr.labels.some(label => label.name === 'no-release')
                );
              }
            } catch (error) {
              core.warning(`Could not check PR labels: ${error.message}`);
            }

            core.setOutput('should_skip', shouldSkip ? 'true' : 'false');

      - name: Check changelog and calculate version
        id: check
        run: |
          # Use shared script for changelog parsing and version calculation
          bash scripts/changelog-version.sh

      - name: Update changelog
        if:
          steps.check.outputs.should_release == 'true' &&
          steps.skip.outputs.should_skip != 'true'
        env:
          NEW_VERSION: ${{ steps.check.outputs.next_version }}
        run: |
          VERSION_NO_V="${NEW_VERSION#v}"
          TODAY=$(date +%Y-%m-%d)

          # Replace [Unreleased*] with versioned header, keeping the permanent
          # history marker between unreleased notes and versioned entries.
          # Use perl for cross-platform compatibility
          perl -0pi -e "s/^## \[Unreleased[^\]]*\]\n(.*?)\n## Full changelog history$/## [Unreleased]\n\n_Add unreleased changes here._\n\n## Full changelog history\n\n## [$VERSION_NO_V] – $TODAY\n\$1/mgs" CHANGELOG.md

          echo "Updated CHANGELOG.md with version $VERSION_NO_V"

      - name: Set up Node
        if:
          steps.check.outputs.should_release == 'true' &&
          steps.skip.outputs.should_skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        if:
          steps.check.outputs.should_release == 'true' &&
          steps.skip.outputs.should_skip != 'true'
        run: npm ci

      - name: Format changelog
        if:
          steps.check.outputs.should_release == 'true' &&
          steps.skip.outputs.should_skip != 'true'
        run: npx prettier --write CHANGELOG.md

      - name: Commit changelog update
        if:
          steps.check.outputs.should_release == 'true' &&
          steps.skip.outputs.should_skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          # Amend the merge commit to include changelog update
          git commit --amend --no-edit
          git push --force-with-lease origin main

      - name: Check for CLI changes
        if: steps.skip.outputs.should_skip != 'true'
        id: cli
        run: |
          # Compare against the latest CLI tag, not the app tag
          PREV_CLI_TAG=$(git tag -l 'cli-v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -1)
          if [ -z "$PREV_CLI_TAG" ]; then
            echo "cli_changed=true" >> $GITHUB_OUTPUT
            echo "No previous CLI tag — will create first release"
          elif git diff --name-only "$PREV_CLI_TAG"..HEAD -- cmd/hover/ npm/ .goreleaser.yml .github/workflows/release-cli.yml | grep -q .; then
            echo "cli_changed=true" >> $GITHUB_OUTPUT
            echo "CLI code changed since $PREV_CLI_TAG"
          else
            echo "cli_changed=false" >> $GITHUB_OUTPUT
            echo "No CLI changes since $PREV_CLI_TAG — skipping CLI release"
          fi

      - name: Create and push tag
        if:
          steps.check.outputs.should_release == 'true' &&
          steps.skip.outputs.should_skip != 'true'
        env:
          NEW_VERSION: ${{ steps.check.outputs.next_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_VERSION" -m "Release $NEW_VERSION"
          git push origin "$NEW_VERSION"

      - name: Create and push CLI tag
        if:
          steps.skip.outputs.should_skip != 'true' &&
          steps.cli.outputs.cli_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Independent CLI version — find latest cli-v* tag and bump patch
          LATEST_CLI_TAG=$(git tag -l 'cli-v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -1)
          if [ -z "$LATEST_CLI_TAG" ]; then
            CLI_VERSION="cli-v0.1.0"
          else
            CLI_VER="${LATEST_CLI_TAG#cli-v}"
            IFS='.' read -r MAJ MIN PAT <<< "$CLI_VER"
            PAT=$((PAT + 1))
            CLI_VERSION="cli-v${MAJ}.${MIN}.${PAT}"
          fi
          git tag -a "$CLI_VERSION" -m "CLI release $CLI_VERSION"
          git push origin "$CLI_VERSION"

      - name: Extract changelog content
        if:
          steps.check.outputs.should_release == 'true' &&
          steps.skip.outputs.should_skip != 'true'
        id: changelog
        env:
          NEW_VERSION: ${{ steps.check.outputs.next_version }}
        run: |
          VERSION_NO_V="${NEW_VERSION#v}"

          # Extract content for this version from updated CHANGELOG.md
          # Get content between this version header and the next version header
          # Use awk to stop before the next version header (more reliable than sed)
          CHANGELOG_CONTENT=$(awk "/^## \[$VERSION_NO_V\]/ {flag=1; next} /^## \[/ {flag=0} flag" CHANGELOG.md)

          # Save to file to preserve newlines
          echo "$CHANGELOG_CONTENT" > "$RUNNER_TEMP/changelog_extract.md"

          echo "Extracted changelog content for $VERSION_NO_V"

      - name: Create GitHub Release
        if:
          steps.check.outputs.should_release == 'true' &&
          steps.skip.outputs.should_skip != 'true'
        uses: actions/github-script@v8
        env:
          NEW_VERSION: ${{ steps.check.outputs.next_version }}
          RUNNER_TEMP: ${{ runner.temp }}
        with:
          script: |
            const fs = require('fs');
            const newVersion = process.env.NEW_VERSION;
            const runnerTemp = process.env.RUNNER_TEMP;
            const prNumber = context.payload.pull_request && context.payload.pull_request.number;
            const prTitle = context.payload.pull_request && context.payload.pull_request.title;
            const commitSha = context.sha;
            const commitMessage = context.payload.head_commit && context.payload.head_commit.message;

            // Read changelog content
            let changelogContent = '';
            try {
              changelogContent = fs.readFileSync(`${runnerTemp}/changelog_extract.md`, 'utf8').trim();
            } catch (err) {
              console.log('Could not read changelog extract:', err);
              changelogContent = `Automated release from PR #${prNumber}: ${prTitle}`;
            }

            // Build release body
            const fallback = prNumber
              ? `Automated release from PR #${prNumber}: ${prTitle}`
              : `Automated release from ${commitSha}: ${commitMessage || 'Update'}`;

            const releaseBody = changelogContent || fallback;

            github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: newVersion,
              name: newVersion,
              body: releaseBody,
              draft: false,
              prerelease: true
            });

name: Release CLI

on:
  push:
    tags:
      - "cli-v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release CLI
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Create version tag for goreleaser
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          # Goreleaser needs a semver tag on HEAD. Create a temporary
          # v* tag from the cli-v* tag so archives are named correctly.
          VERSION_TAG="${GIT_TAG#cli-}"
          git tag -f "$VERSION_TAG"
          echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_ENV

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up version tag
        if: always()
        run: git tag -d "$VERSION_TAG" 2>/dev/null || true

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          NPM_TOKEN: op://Good Native/npm/npm_access_token

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        working-directory: npm
        env:
          GIT_TAG: ${{ github.ref_name }}
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
        run: |
          VERSION="${GIT_TAG#cli-v}"

          cp ../npm-README.md README.md

          npm version "$VERSION" --no-git-tag-version
          npm publish --access public

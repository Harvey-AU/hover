name: Cleanup Orphaned Preview Apps

on:
  schedule:
    - cron: "0 * * * *" # Every hour
  workflow_dispatch: # Allow manual trigger

jobs:
  cleanup:
    name: Cleanup Orphaned Apps
    runs-on: ubuntu-latest

    steps:
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          FLY_API_TOKEN: op://Good Native/hover-fly/FLY_API_TOKEN

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@63da3ecc5e2793b98a3f2519b3d75d4f4c11cec2 # pinned

      - name: Find and destroy orphaned preview apps
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          echo "Listing all preview apps..."
          # Match every preview-app prefix used by the review-apps workflow.
          # The PR-number extraction below uses longest-prefix-first sed
          # rules so hover-analysis-pr-12 is not mis-classified as
          # hover-pr-... by a naive substring strip.
          APPS=$(flyctl apps list --json | jq -r '
            .[] | select(
              (.Name | startswith("hover-pr-")) or
              (.Name | startswith("hover-worker-pr-")) or
              (.Name | startswith("hover-analysis-pr-"))
            ) | .Name')

          if [ -z "$APPS" ]; then
            echo "No preview apps found"
            exit 0
          fi

          echo "Found preview apps:"
          echo "$APPS"
          echo ""

          for APP in $APPS; do
            # Extract PR number, longest prefix first so the analysis and
            # worker variants are stripped before the bare hover-pr- form.
            PR_NUMBER=$(echo "$APP" \
              | sed -e 's/^hover-analysis-pr-//' \
                    -e 's/^hover-worker-pr-//' \
                    -e 's/^hover-pr-//')

            echo "Checking PR #$PR_NUMBER for app $APP..."

            # Check if PR exists and get its state
            PR_STATE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state --jq '.state' 2>/dev/null || echo "NOT_FOUND")

            echo "  PR state: $PR_STATE"

            if [ "$PR_STATE" = "OPEN" ]; then
              echo "  PR is open, keeping app"
            else
              echo "  PR is closed/merged/missing, destroying app..."
              flyctl apps destroy "$APP" --yes || echo "  Failed to destroy $APP"
            fi

            echo ""
          done

          # The PR-close workflow also destroys the per-PR Upstash Redis
          # instance, but only if the workflow runs to completion. If a
          # PR was force-closed during a deploy, or the close-event
          # workflow failed, the Redis instance survives and continues
          # accruing PAYG charges. Sweep the orphaned ones here using
          # the same PR-state check.
          echo "Listing orphaned Upstash Redis instances..."
          REDIS_NAMES=$(flyctl redis list --json 2>/dev/null \
            | jq -r '.[] | select(.Name | startswith("hover-redis-pr-")) | .Name' \
            || echo "")

          if [ -z "$REDIS_NAMES" ]; then
            echo "No hover-redis-pr-* instances found"
          else
            for REDIS_NAME in $REDIS_NAMES; do
              PR_NUMBER=$(echo "$REDIS_NAME" | sed -e 's/^hover-redis-pr-//')
              echo "Checking PR #$PR_NUMBER for Redis $REDIS_NAME..."

              PR_STATE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state --jq '.state' 2>/dev/null || echo "NOT_FOUND")
              echo "  PR state: $PR_STATE"

              if [ "$PR_STATE" = "OPEN" ]; then
                echo "  PR is open, keeping Redis"
              else
                echo "  PR is closed/merged/missing, destroying Redis..."
                flyctl redis destroy "$REDIS_NAME" --yes || echo "  Failed to destroy $REDIS_NAME"
              fi
              echo ""
            done
          fi

          echo "Cleanup complete"

# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/
# CI trigger after repository rename (no functional change)

name: Fly Deploy
on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "webflow-designer-extension/**"
      - "webflow-designer-extension-cli/**"
      - "LICENSE"
      - ".gitignore"
      - "CHANGELOG.md"
      - "SECURITY.md"
      - "Roadmap.md"
      - "QandA.md"
jobs:
  deploy:
    name: Deploy app
    runs-on: blacksmith-4vcpu-ubuntu-2404
    concurrency: deploy-group # optional: ensure only one action runs at a time
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          FLY_API_TOKEN: op://Good Native/hover-fly/FLY_API_TOKEN

      - uses: superfly/flyctl-actions/setup-flyctl@63da3ecc5e2793b98a3f2519b3d75d4f4c11cec2 # pinned
      - run: flyctl deploy --remote-only

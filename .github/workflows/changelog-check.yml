name: Changelog Check

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "!CHANGELOG.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
      - "SECURITY.md"
      - "Roadmap.md"
      - "QandA.md"
      - ".prettierrc"
      - ".prettierignore"
      - ".golangci.yml"
      - ".github/**"

jobs:
  check-changelog:
    name: Validate Changelog Updated
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for changelog updates
        id: check
        env:
          COMPARE_REF: origin/main
        run: |
          # Fail with helpful message if [Unreleased] section is missing
          if ! grep -q "^## \[Unreleased" CHANGELOG.md; then
            echo "❌ ERROR: No [Unreleased] section found in CHANGELOG.md"
            echo ""
            echo "Please add a changelog entry for your changes:"
            echo "  ## [Unreleased]          → for patch releases"
            echo "  ## [Unreleased:minor]    → for minor releases"
            echo "  ## [Unreleased:major]    → for major releases"
            exit 1
          fi

          if ! grep -q "^## Full changelog history$" CHANGELOG.md; then
            echo "❌ ERROR: No permanent history marker found in CHANGELOG.md"
            echo ""
            echo "Expected this heading between the unreleased section and version history:"
            echo "  ## Full changelog history"
            exit 1
          fi

          # Use shared script for changelog parsing and version calculation
          bash scripts/changelog-version.sh

          # Report status
          if grep -q 'should_release=true' "$GITHUB_OUTPUT"; then
            echo "✅ Changelog has been updated with changes"
          else
            echo "⚠️  [Unreleased] section is empty — release will have blank changelog"
          fi

      - name: Comment on PR with version info
        uses: actions/github-script@v8
        env:
          RELEASE_TYPE: ${{ steps.check.outputs.release_type }}
          CURRENT_VERSION: ${{ steps.check.outputs.current_version }}
          NEXT_VERSION: ${{ steps.check.outputs.next_version }}
          CLI_CHANGED: ${{ steps.check.outputs.cli_changed }}
          CLI_CURRENT: ${{ steps.check.outputs.cli_current }}
          CLI_NEXT: ${{ steps.check.outputs.cli_next }}
          CHANGELOG_CONTENT: ${{ steps.check.outputs.changelog_content }}
        with:
          script: |
            const releaseType = process.env.RELEASE_TYPE;
            const currentVersion = process.env.CURRENT_VERSION;
            const nextVersion = process.env.NEXT_VERSION;
            const cliChanged = process.env.CLI_CHANGED === 'true';
            const cliCurrent = process.env.CLI_CURRENT;
            const cliNext = process.env.CLI_NEXT;
            const changelogContent = (process.env.CHANGELOG_CONTENT || '').trim();

            const isThrottleError = (error) => {
              const status = error?.status;
              const message = String(error?.response?.data?.message || error?.message || '').toLowerCase();
              return status === 429 || (status === 403 && message.includes('temporarily being throttled'));
            };

            const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

            const withRetry = async (fn, label) => {
              const delays = [2000, 5000, 10000];
              for (let attempt = 0; attempt <= delays.length; attempt++) {
                try {
                  return await fn();
                } catch (error) {
                  if (!isThrottleError(error) || attempt === delays.length) {
                    throw error;
                  }
                  const delay = delays[attempt];
                  core.warning(`${label} throttled by GitHub API (attempt ${attempt + 1}/${delays.length + 1}). Retrying in ${delay}ms.`);
                  await sleep(delay);
                }
              }
            };

            const lines = [
              `# Release Versions`,
              ``,
              `**App** ${releaseType}: \`${currentVersion}\` → \`${nextVersion}\``,
            ];
            if (cliChanged) {
              lines.push(`**CLI** patch: \`${cliCurrent}\` → \`${cliNext}\``);
            }
            if (changelogContent) {
              lines.push(``, `# Changelog`, ``, changelogContent);
            }
            const body = lines.join('\n');

            try {
              // Find existing comment
              const { data: comments } = await withRetry(() => github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number
              }), 'List comments');

              const botComment = comments.find(comment =>
                comment.user.type === 'Bot' &&
                (comment.body.includes('Release Versions') || comment.body.includes('Release Preview'))
              );

              if (botComment) {
                // Update existing comment
                await withRetry(() => github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: body
                }), 'Update comment');
              } else {
                // Create new comment
                await withRetry(() => github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: body
                }), 'Create comment');
              }
            } catch (error) {
              if (isThrottleError(error)) {
                core.warning('Skipping release-preview PR comment due to temporary GitHub API throttling.');
              } else {
                throw error;
              }
            }

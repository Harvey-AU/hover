name: Changelog Check

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
      - "SECURITY.md"
      - "Roadmap.md"
      - "QandA.md"
      - ".prettierrc"
      - ".prettierignore"
      - ".golangci.yml"
      - ".github/**"

jobs:
  check-changelog:
    name: Validate Changelog Updated
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for changelog updates
        id: check
        run: |
          # Check if CHANGELOG.md has content under [Unreleased]
          if ! grep -q "^## \[Unreleased" CHANGELOG.md; then
            echo "❌ ERROR: No [Unreleased] section found in CHANGELOG.md"
            echo ""
            echo "Please add a changelog entry for your changes:"
            echo "  ## [Unreleased]          → for patch releases"
            echo "  ## [Unreleased:minor]    → for minor releases"
            echo "  ## [Unreleased:major]    → for major releases"
            exit 1
          fi

          # Extract content between [Unreleased] and next version header
          UNRELEASED_CONTENT=$(sed -n '/^## \[Unreleased/,/^## \[0-9/p' CHANGELOG.md | sed '$d' | tail -n +2)

          # Check if there's actual content (not just whitespace)
          if [ -z "$(echo "$UNRELEASED_CONTENT" | grep -v '^[[:space:]]*$')" ]; then
            echo "⚠️  [Unreleased] section is empty - release will have blank changelog"
          else
            echo "✅ Changelog has been updated with changes"
          fi

          # Determine release type from changelog header
          CHANGELOG_HEADER=$(grep "^## \[Unreleased" CHANGELOG.md | head -1)

          if echo "$CHANGELOG_HEADER" | grep -qi "\[Unreleased:major\]"; then
            RELEASE_TYPE="major"
          elif echo "$CHANGELOG_HEADER" | grep -qi "\[Unreleased:minor\]"; then
            RELEASE_TYPE="minor"
          else
            RELEASE_TYPE="patch"
          fi

          echo "release_type=$RELEASE_TYPE" >> $GITHUB_OUTPUT

          # Calculate next version
          CURRENT_TAG=$(git tag -l 'v[0-9]*' --sort=-version:refname | head -1)
          CURRENT_TAG=${CURRENT_TAG:-v0.6.4}
          CURRENT_VERSION=${CURRENT_TAG#v}
          CURRENT_VERSION=${CURRENT_VERSION%%-*}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          if [ "$RELEASE_TYPE" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$RELEASE_TYPE" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "next_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Check if CLI files changed in this PR
          CLI_CHANGED="false"
          if git diff --name-only "origin/main"...HEAD -- cmd/hover/ npm/ | grep -q .; then
            CLI_CHANGED="true"
            LATEST_CLI_TAG=$(git tag -l 'cli-v*' --sort=-version:refname | head -1)
            if [ -z "$LATEST_CLI_TAG" ]; then
              CLI_NEXT="cli-v0.1.0"
            else
              CLI_VER="${LATEST_CLI_TAG#cli-v}"
              IFS='.' read -r CMAJ CMIN CPAT <<< "$CLI_VER"
              CPAT=$((CPAT + 1))
              CLI_NEXT="cli-v${CMAJ}.${CMIN}.${CPAT}"
            fi
            echo "cli_next=$CLI_NEXT" >> $GITHUB_OUTPUT
          fi
          echo "cli_changed=$CLI_CHANGED" >> $GITHUB_OUTPUT
          echo "Next version will be: $NEW_VERSION"

      - name: Comment on PR with version info
        uses: actions/github-script@v8
        env:
          RELEASE_TYPE: ${{ steps.check.outputs.release_type }}
          NEXT_VERSION: ${{ steps.check.outputs.next_version }}
          CLI_CHANGED: ${{ steps.check.outputs.cli_changed }}
          CLI_NEXT: ${{ steps.check.outputs.cli_next }}
        with:
          script: |
            const releaseType = process.env.RELEASE_TYPE;
            const nextVersion = process.env.NEXT_VERSION;
            const cliChanged = process.env.CLI_CHANGED === 'true';
            const cliNext = process.env.CLI_NEXT;

            const isThrottleError = (error) => {
              const status = error?.status;
              const message = String(error?.response?.data?.message || error?.message || '').toLowerCase();
              return status === 429 || (status === 403 && message.includes('temporarily being throttled'));
            };

            const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

            const withRetry = async (fn, label) => {
              const delays = [2000, 5000, 10000];
              for (let attempt = 0; attempt <= delays.length; attempt++) {
                try {
                  return await fn();
                } catch (error) {
                  if (!isThrottleError(error) || attempt === delays.length) {
                    throw error;
                  }
                  const delay = delays[attempt];
                  core.warning(`${label} throttled by GitHub API (attempt ${attempt + 1}/${delays.length + 1}). Retrying in ${delay}ms.`);
                  await sleep(delay);
                }
              }
            };

            const cliLine = cliChanged
              ? `\n            - **CLI Version:** \`${cliNext}\` (npm: \`@harvey-au/hover\`)`
              : '';

            const body = `## 🏷️ Release Preview

            When this PR is merged, it will automatically create:

            - **Version:** \`${nextVersion}\` (${releaseType} release)
            - **Tag:** \`${nextVersion}\`${cliLine}
            - **GitHub Release:** Pre-release with changelog content

            The changelog will be updated and committed automatically.

            ---

            💡 **Tip:** Update the changelog heading to control release type:
            - \`## [Unreleased]\` or \`## [Unreleased:patch]\` → patch release (default)
            - \`## [Unreleased:minor]\` → minor release
            - \`## [Unreleased:major]\` → major release`;

            try {
              // Find existing comment
              const { data: comments } = await withRetry(() => github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number
              }), 'List comments');

              const botComment = comments.find(comment =>
                comment.user.type === 'Bot' &&
                comment.body.includes('🏷️ Release Preview')
              );

              if (botComment) {
                // Update existing comment
                await withRetry(() => github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: body
                }), 'Update comment');
              } else {
                // Create new comment
                await withRetry(() => github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: body
                }), 'Create comment');
              }
            } catch (error) {
              if (isThrottleError(error)) {
                core.warning('Skipping release-preview PR comment due to temporary GitHub API throttling.');
              } else {
                throw error;
              }
            }

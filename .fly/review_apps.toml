# Fly Review Apps Configuration
# See: https://fly.io/docs/reference/fly-review-apps/

# Deploy to Sydney to co-locate with Supabase database
primary_region = "syd"

[review_apps]
# Enable automatic deployment for PRs targeting test-branch
auto_deploy = true
# Automatically destroy when PR is closed/merged
auto_destroy = true

# Base branch for review apps (PRs must target this branch)
base_branch = "main"

# Optional: Custom subdomain pattern
# Will create URLs like: hover-pr-123.fly.dev
app_name_pattern = "hover-pr-{pr_number}"
primary_region = "syd"

# Environment overrides for staging
[env]
APP_ENV = "staging"
PORT = "8080"
GNH_ENABLE_TURNSTILE = "true"

# Explicitly source DATABASE_URL from secrets
DATABASE_URL = { from_secret = "DATABASE_URL" }
# Public configuration - same as production
SUPABASE_URL = "https://gpzjtbgtdjxnacdfujvx.supabase.co"
SUPABASE_PROJECT_REF = "gpzjtbgtdjxnacdfujvx"
SUPABASE_AUTH_URL = "https://hover.auth.goodnative.co"
SUPABASE_FALLBACK_AUTH_URL = "https://gpzjtbgtdjxnacdfujvx.supabase.co"
SUPABASE_LEGACY_AUTH_URL = "https://gpzjtbgtdjxnacdfujvx.supabase.co"
SUPABASE_PUBLISHABLE_KEY = "sb_publishable_xCn-z8wEo4MPJnbPq6cvXg_09fINjIp"
SLACK_CLIENT_ID = "475806237719.8953791603746"
WEBFLOW_CLIENT_ID = "b0a05758d95823fcef73f57e836e55232bf7c5730794222786040800230ea329"
GOOGLE_CLIENT_ID = "721107686014-okh41udv0lkb40ijnsoeh53unj9kn0en.apps.googleusercontent.com"

# Cold-storage archival (R2) — credentials via flyctl secrets
ARCHIVE_PROVIDER = "r2"
ARCHIVE_BUCKET = "native-hover-archive"
ARCHIVE_RETENTION_JOBS = "3"
ARCHIVE_INTERVAL = "1m"
ARCHIVE_BATCH_SIZE = "100"
ARCHIVE_CONCURRENCY = "5"

# Performance settings (preview has own DB now, can align closer to prod)
WORKER_CONCURRENCY = "5"                    # Reduced for preview capacity
DB_MAX_OPEN_CONNS = "40"                   # Supabase preview pool size
DB_MAX_IDLE_CONNS = "8"                    # Scaled from prod 20
DB_QUEUE_MAX_CONCURRENCY = "20"             # Half of prod
DB_TX_MAX_RETRIES = "5"                     # Same as prod
GNH_RUNNING_TASK_BATCH_SIZE = "32"          # Same as prod (reduces DB trips)
GNH_RUNNING_TASK_FLUSH_INTERVAL_MS = "200"  # Same as prod
GNH_BATCH_CHANNEL_SIZE = "1000"             # Scaled from prod 5000
GNH_HTML_PERSIST_WORKERS = "8"              # Scaled from prod 32
GNH_HTML_PERSIST_QUEUE_SIZE = "512"         # Scaled from prod 2048
GNH_HEALTH_PROBE_INTERVAL_SECONDS = "30"    # Same as prod
GNH_WORKER_IDLE_THRESHOLD = "10"            # Mark worker idle after 10 consecutive no-task polls
GNH_WORKER_SCALE_COOLDOWN_SECONDS = "120"   # Same as prod
ALLOW_DB_RESET = "true"
GNH_MAX_WORKERS = "130"
GNH_QUOTA_PROMOTION_INTERVAL_SECONDS = "18"
GNH_TASK_MONITOR_INTERVAL_SECONDS = "20"
GNH_SITEMAP_BATCH_SIZE = "100"
GNH_SITEMAP_BATCH_DELAY_MS = "200"
GNH_SITEMAP_CONCURRENCY = "5"
GNH_OTEL_EXPORT_INTERVAL_SECONDS = "60"
GNH_PRESSURE_HIGH_MARK_MS = "80"
GNH_PRESSURE_LOW_MARK_MS = "40"
GNH_PRESSURE_INITIAL_LIMIT = "88"
GNH_PRESSURE_MIN_LIMIT = "30"
GNH_PRESSURE_STEP_DOWN = "5"
GNH_WAITING_RECOVERY_INTERVAL_SECONDS = "2"
GNH_LINK_DISCOVERY_MIN_PRIORITY = "0.7"
GNH_RATE_LIMIT_BASE_DELAY_MS = "50"
FLIGHT_RECORDER_ENABLED = "false"
LOG_LEVEL = "info"
OBSERVABILITY_ENABLED = "true"              # Enable OTEL for preview throughput debugging
OTEL_EXPORTER_OTLP_ENDPOINT = "https://otlp-gateway-prod-au-southeast-1.grafana.net/otlp/v1/traces"

[deploy]
strategy = "immediate"

# Use same machine config as production but smaller
[vm]
memory = '1gb'
cpu_kind = 'shared'
cpus = 2

# Same health checks as production
[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = 'stop'
auto_start_machines = true
min_machines_running = 1
max_machines_running = 1

[[http_service.checks]]
grace_period = "10s"  # Reduced from 30s for faster deployments
interval = "10s"      # Reduced from 15s for quicker health checks
method = "GET"
path = "/health"
protocol = "http"
timeout = "5s"        # Reduced from 10s

[http_service.checks.headers]
Content-Type = "text/plain"

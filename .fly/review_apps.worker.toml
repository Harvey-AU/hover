# Fly Review Apps Configuration — Worker Service
#
# Deployed alongside the main review app (.fly/review_apps.toml) so the
# preview exercises the full producer → Redis → consumer flow. The worker
# consumes tasks from Redis Streams and persists results to Postgres.
#
# Production equivalent: fly.worker.toml.
# Per-PR app name: hover-worker-pr-<PR_NUMBER>.

primary_region = "syd"

[build]

# Override the Dockerfile CMD to run start.sh with the worker binary.
# Passing "worker" as the argument makes start.sh launch ./worker while
# still starting the Alloy metrics sidecar, so review apps emit
# bee.worker.* and bee.broker.* series tagged with
# app=hover-worker-pr-<N> and environment=staging.
[processes]
  worker = "./start.sh worker"

# Environment overrides for preview. Scaled down from fly.worker.toml to
# fit within the Supabase preview branch's shared pool (see the
# "Set preview branch pool size" step in review-apps.yml).
[env]
  APP_ENV = "staging"

  # Worker concurrency (prod: 30 / 20 / 130)
  WORKER_COUNT = "4"
  WORKER_CONCURRENCY = "5"
  GNH_MAX_WORKERS = "40"
  # Admission breadth (prod: 250 / 3 → 390). Preview scales with smaller pool.
  GNH_PENDING_ADMISSION_LIMIT_MIN = "80"
  GNH_PENDING_ADMISSION_WORKER_FACTOR = "3"

  # Leave headroom for the API app on the shared Supabase pool.
  DB_MAX_OPEN_CONNS = "15"
  DB_MAX_IDLE_CONNS = "4"
  DB_QUEUE_MAX_CONCURRENCY = "10"
  DB_TX_MAX_RETRIES = "5"

  # Redis broker — REDIS_URL is injected via flyctl secrets in CI.
  # TLS is inferred from the URL scheme in broker.ConfigFromEnv (rediss:// →
  # on, redis:// → off). Upstash-on-Fly's private endpoint is redis://, so
  # overriding REDIS_TLS_ENABLED here would force a broken handshake.
  REDIS_POOL_SIZE = "30"
  REDIS_DISPATCH_INTERVAL_MS = "200"
  REDIS_DISPATCH_BATCH_SIZE = "20"
  REDIS_CONSUMER_BLOCK_MS = "2000"
  REDIS_AUTOCLAIM_INTERVAL_S = "30"
  REDIS_COUNTER_SYNC_INTERVAL_S = "5"

  # Batch manager (scaled from prod).
  GNH_BATCH_CHANNEL_SIZE = "1000"
  GNH_RUNNING_TASK_BATCH_SIZE = "32"
  GNH_RUNNING_TASK_FLUSH_INTERVAL_MS = "200"

  # Link discovery + pacing (aligned with API preview).
  # Preview runs a tighter threshold than prod (0.7 vs 0.5) so crawls stay
  # bounded on the smaller DB pool — see .fly/review_apps.toml.
  GNH_LINK_DISCOVERY_MIN_PRIORITY = "0.7"
  GNH_RATE_LIMIT_BASE_DELAY_MS = "50"
  GNH_RATE_LIMIT_MAX_DELAY_MS = "60000"
  # Floor on DomainPacer RetryAfter — see fly.worker.toml for rationale.
  GNH_DOMAIN_DELAY_PAUSE_MS = "100"

  # Scale pressure-controller floor to the smaller preview DB pool. Without
  # this, GNH_PRESSURE_MIN_LIMIT defaults to 30 while DB_QUEUE_MAX_CONCURRENCY
  # only allows 10 — the controller clamps the floor to the max and logs a
  # warning on every boot. Setting an explicit floor silences the noise.
  GNH_PRESSURE_MIN_LIMIT = "5"
  GNH_PRESSURE_INITIAL_LIMIT = "8"

  # Observability.
  LOG_LEVEL = "debug"
  OBSERVABILITY_ENABLED = "true"
  OTEL_EXPORTER_OTLP_ENDPOINT = "https://otlp-gateway-prod-au-southeast-1.grafana.net/otlp/v1/traces"

  # Cold-storage archival (R2) — credentials via flyctl secrets.
  # Review apps land in a dedicated bucket so cleanup is a single bucket
  # purge (or R2 lifecycle rule) instead of per-PR prefix surgery on the
  # production bucket. ARCHIVE_PATH_PREFIX is injected per-PR by the
  # review-apps workflow with the PR number, giving paths like
  # native-hover-archive-review/<pr>/jobs/<job>/tasks/<task>/...
  ARCHIVE_PROVIDER = "r2"
  ARCHIVE_BUCKET = "native-hover-archive-review"

  # Outbox sweeper — mirror prod defaults.
  OUTBOX_SWEEP_INTERVAL_MS = "200"
  OUTBOX_SWEEP_BATCH_SIZE = "100"

  # Explicitly source DATABASE_URL from secrets for parity with the API.
  DATABASE_URL = { from_secret = "DATABASE_URL" }

[deploy]
  strategy = "immediate"

# Keep the machine restarting after crashes. Without this, Fly's default
# on-failure policy gives up after 10 retries — so a transient outage
# (Redis unreachable, DB not ready yet) can leave the preview worker
# permanently stopped until someone runs `flyctl machine start`.
[[restart]]
  policy = "always"

# Preview-sized machine (prod is 4gb performance/2). The worker does not
# expose HTTP, so no [http_service] block.
[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 2
